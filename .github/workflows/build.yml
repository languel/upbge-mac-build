name: Build UPBGE macOS arm64

on:
  workflow_dispatch:
    inputs:
      upbge_ref:
        description: "UPBGE ref to build (branch, tag, or SHA)"
        default: "master"
      notarize:
        description: "Sign + notarize (requires secrets)"
        type: boolean
        default: true
  schedule:
    # Weekly, Monday 06:00 UTC. Skips automatically if upstream is unchanged.
    - cron: "0 6 * * 1"

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15  # Apple Silicon
    timeout-minutes: 350
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v5

      - name: Resolve upstream commit
        id: upstream
        run: |
          REF="${{ github.event.inputs.upbge_ref || 'master' }}"
          SHA=$(git ls-remote https://github.com/UPBGE/upbge "$REF" | cut -f1)
          [ -n "$SHA" ] || SHA="$REF"   # assume a raw SHA was passed
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short=${SHA:0:12}" >> "$GITHUB_OUTPUT"
          echo "Building UPBGE @ $SHA"

      - name: Skip if already released (scheduled runs only)
        id: skip
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if gh release list --limit 30 --json tagName -q '.[].tagName' | grep -q "${{ steps.upstream.outputs.short }}"; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Upstream unchanged since last release â€” skipping."
            fi
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Clone UPBGE
        if: steps.skip.outputs.skip != 'true'
        run: |
          git clone https://github.com/UPBGE/upbge upbge
          cd upbge
          git checkout ${{ steps.upstream.outputs.sha }}

      - name: Apply local patches
        if: steps.skip.outputs.skip != 'true'
        run: |
          cd upbge
          FAILED=""
          for p in ../patches/*.patch; do
            if git apply --check "$p" 2>/dev/null; then
              git apply "$p" && echo "applied: $p"
            else
              echo "::warning::patch no longer applies (may be fixed upstream): $p"
              FAILED="$FAILED $p"
            fi
          done
          echo "PATCHES_SKIPPED=$FAILED" >> "$GITHUB_ENV"

      - name: Cache precompiled libs
        if: steps.skip.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: upbge/lib/macos_arm64
          key: upbge-libs-arm64-${{ hashFiles('upbge/build_files/config/**') }}
          restore-keys: upbge-libs-arm64-

      - name: Cache ccache
        if: steps.skip.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/ccache
          key: ccache-arm64-${{ steps.upstream.outputs.short }}
          restore-keys: ccache-arm64-

      - name: Build
        if: steps.skip.outputs.skip != 'true'
        run: |
          brew install ninja ccache create-dmg
          if ! UPBGE_ROOT="$GITHUB_WORKSPACE" ./scripts/build.sh; then
            echo "=== build.status ==="; cat build.status || true
            echo "=== last 100 lines of build.log ==="; tail -100 build.log || true
            exit 1
          fi
          cat build.status

      - name: Import signing certificate
        if: steps.skip.outputs.skip != 'true' && (github.event.inputs.notarize != 'false')
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_P12" ]; then
            echo "::warning::No signing cert configured â€” producing unsigned build."
            echo "SKIP_SIGN=1" >> "$GITHUB_ENV"; exit 0
          fi
          KEYCHAIN=build.keychain
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security unlock-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          echo "$MACOS_CERT_P12" | base64 -d > cert.p12
          security import cert.p12 -k $KEYCHAIN -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" $KEYCHAIN
          rm cert.p12

      - name: Package, sign, notarize DMG
        if: steps.skip.outputs.skip != 'true'
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          # Follow upstream artifact naming: upbge-0.52-alpha-linux-x86_64-2026-06-07
          VER_H=upbge/source/blender/blenkernel/BKE_blender_version.h
          ver() { grep -m1 "#define $1 " "$VER_H" | awk '{print $3}'; }
          UPBGE_VER="0.$(ver UPBGE_VERSION)"
          UPBGE_CYCLE=$(ver UPBGE_VERSION_CYCLE)
          B=$(ver BLENDER_VERSION)
          BLENDER_VER="$((B / 100)).$((B % 100)).$(ver BLENDER_VERSION_PATCH)"
          DATE=$(date +%Y-%m-%d)
          VERSION="${UPBGE_VER}-${UPBGE_CYCLE}-macos-arm64-${DATE}"
          ARGS=(--version "$VERSION")
          if [ -z "${SKIP_SIGN:-}" ] && [ -n "$NOTARY_PASSWORD" ] && [ "${{ github.event.inputs.notarize }}" != "false" ]; then
            ARGS+=(--notarize)
          fi
          UPBGE_ROOT="$GITHUB_WORKSPACE" ./scripts/package_dmg.sh --plain-dmg "${ARGS[@]}"
          {
            echo "VERSION=$VERSION"
            echo "UPBGE_VER=$UPBGE_VER"
            echo "UPBGE_CYCLE=$UPBGE_CYCLE"
            echo "BLENDER_VER=$BLENDER_VER"
            echo "BUILD_DATE=$DATE"
          } >> "$GITHUB_ENV"

      - name: Create release
        if: steps.skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Tag keeps the upstream short SHA â€” the weekly skip-if-unchanged check greps for it.
          TAG="v${UPBGE_VER}-${UPBGE_CYCLE}-${BUILD_DATE}-${{ steps.upstream.outputs.short }}"
          CYCLE_TITLE=$(echo "$UPBGE_CYCLE" | awk '{print toupper(substr($0,1,1)) substr($0,2)}')
          NOTES="Unofficial macOS Apple Silicon (arm64) build of [UPBGE](https://github.com/UPBGE/upbge) **$UPBGE_VER $CYCLE_TITLE** at commit [\`${{ steps.upstream.outputs.short }}\`](https://github.com/UPBGE/upbge/commit/${{ steps.upstream.outputs.sha }}), embedding Blender $BLENDER_VER. Official releases and version naming: [UPBGE releases](https://github.com/UPBGE/upbge/releases)."
          [ -n "${PATCHES_SKIPPED:-}" ] && NOTES="$NOTES\n\nâš ď¸Ź Patches skipped (no longer apply):${PATCHES_SKIPPED}"
          gh release create "$TAG" dist/upbge-*.dmg \
            --title "UPBGE $UPBGE_VER $CYCLE_TITLE â€” macOS arm64 ($BUILD_DATE)" \
            --notes "$(printf "$NOTES")"
